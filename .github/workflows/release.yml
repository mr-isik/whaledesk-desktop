name: Wails Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build each platform using the official Wails Build Action
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build – ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            build-tags: "webkit2_41"

          - os: windows-latest
            platform: windows/amd64
            build-tags: ""

          - os: macos-latest
            platform: darwin/universal
            build-tags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build with Wails Action
        uses: dAppServer/wails-build-action@v3
        with:
          build-name: whaledesk-desktop
          build-platform: ${{ matrix.platform }}
          build-tags: ${{ matrix.build-tags }}
          go-version: "1.23"
          node-version: "20"
          package: false
          nsis: false

      - name: Package – Linux
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          cd build/bin

          BINARY="whaledesk-desktop"
          VERSION="${GITHUB_REF_NAME#v}"
          [[ -z "$VERSION" ]] && VERSION="1.0.0"

          # Verify and set permissions
          ls -la
          chmod +x "$BINARY"

          # ── tar.gz (preserves execute permissions) ──────────────
          tar -czf "whaledesk-linux-amd64.tar.gz" "$BINARY"

          # ── .deb package ────────────────────────────────────────
          PKG="whaledesk-desktop_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/pixmaps"

          cp "$BINARY" "${PKG}/usr/bin/whaledesk-desktop"
          chmod 755   "${PKG}/usr/bin/whaledesk-desktop"

          # App icon
          if [[ -f "../appicon.png" ]]; then
            cp ../appicon.png "${PKG}/usr/share/pixmaps/whaledesk-desktop.png"
          fi

          # control file
          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: whaledesk-desktop
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Maintainer: mr-isik <faruk_isik_24@protonmail.com>
          Description: Whaledesk Desktop Client
           Modern desktop client for Whaledesk.
          EOF

          # .desktop file
          cat > "${PKG}/usr/share/applications/whaledesk-desktop.desktop" <<EOF
          [Desktop Entry]
          Name=Whaledesk
          Comment=Whaledesk Desktop Client
          Exec=whaledesk-desktop
          Icon=whaledesk-desktop
          Terminal=false
          Type=Application
          Categories=Network;InstantMessaging;
          EOF

          dpkg-deb --build "$PKG" "${PKG}.deb"

      - name: Package – macOS
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          cd build/bin

          APP=$(find . -maxdepth 1 -name "*.app" | head -n 1)
          if [[ -z "$APP" ]]; then
            echo "ERROR: .app bundle not found!" >&2
            ls -la
            exit 1
          fi

          ditto -c -k --keepParent "$APP" "whaledesk-mac-universal.zip"

      - name: Package – Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path build\bin -Filter "*.exe" | Select-Object -First 1
          if (-not $src) { Write-Error "EXE not found!"; exit 1 }
          Rename-Item -Path $src.FullName -NewName "whaledesk-windows-amd64.exe"

      - name: Upload artifact – Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/bin/whaledesk-linux-amd64.tar.gz
            build/bin/*.deb
          if-no-files-found: error

      - name: Upload artifact – macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: build/bin/whaledesk-mac-universal.zip
          if-no-files-found: error

      - name: Upload artifact – Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: build/bin/whaledesk-windows-amd64.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-files/whaledesk-linux-amd64.tar.gz
            release-files/*.deb
            release-files/whaledesk-mac-universal.zip
            release-files/whaledesk-windows-amd64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
