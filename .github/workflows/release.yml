name: Wails Build & Release

on:
  push:
    tags:
      - "v*"

# GitHub'ın Release sayfasına dosya yükleyebilmesi için zorunlu izin
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
          - os: windows-latest
            platform: windows/amd64
          - os: macos-latest
            platform: darwin/universal

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Application
        run: wails build -platform ${{ matrix.platform }}

      - name: Prepare Files for Release
        shell: bash
        run: |
          cd build/bin
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv *.exe whaledesk-windows.exe
          elif [ "${{ runner.os }}" == "macOS" ]; then
            zip -r whaledesk-mac.zip *.app
          else
            find . -maxdepth 1 -type f -not -name "*.*" -exec mv {} whaledesk-linux \;
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/whaledesk-windows.exe
            build/bin/whaledesk-mac.zip
            build/bin/whaledesk-linux
