name: Wails Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────────────────────
  # Build job for each platform
  # ─────────────────────────────────────────────────────────────
  build:
    name: Build – ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            wails_flags: "-tags webkit2_41"

          - os: windows-latest
            platform: windows/amd64
            wails_flags: "-nsis"

          - os: macos-latest
            platform: darwin/universal
            wails_flags: ""

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            dpkg-dev

      - name: Install Frontend Dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Frontend
        working-directory: frontend
        run: npm run build

      - name: Verify Frontend Build
        shell: bash
        run: |
          echo "=== frontend/dist contents ==="
          ls -la frontend/dist/
          if [ ! -f "frontend/dist/index.html" ]; then
            echo "ERROR: frontend/dist/index.html not found!"
            exit 1
          fi
          echo "Frontend build verified successfully."

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build
        run: wails build -clean -platform ${{ matrix.platform }} ${{ matrix.wails_flags }} -debug

      - name: Verify Build Output
        shell: bash
        run: |
          echo "=== build/bin contents ==="
          ls -la build/bin/
          echo "=== Binary file info ==="
          file build/bin/* || true

      - name: Package – Linux
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          cd build/bin

          BINARY="whaledesk-desktop"
          VERSION="${GITHUB_REF_NAME#v}"
          [[ -z "$VERSION" ]] && VERSION="1.0.0"

          # Verify binary
          ls -la
          chmod +x "$BINARY"

          # ── tar.gz (preserves execute permissions) ──────────────
          tar -czf "whaledesk-linux-amd64.tar.gz" "$BINARY"

          # ── .deb package ────────────────────────────────────────
          PKG="whaledesk-desktop_${VERSION}_amd64"
          mkdir -p "${PKG}/DEBIAN"
          mkdir -p "${PKG}/usr/bin"
          mkdir -p "${PKG}/usr/share/applications"
          mkdir -p "${PKG}/usr/share/pixmaps"

          cp "$BINARY" "${PKG}/usr/bin/whaledesk-desktop"
          chmod 755   "${PKG}/usr/bin/whaledesk-desktop"

          # App icon
          if [[ -f "../appicon.png" ]]; then
            cp ../appicon.png "${PKG}/usr/share/pixmaps/whaledesk-desktop.png"
          fi

          # control file
          cat > "${PKG}/DEBIAN/control" <<EOF
          Package: whaledesk-desktop
          Version: ${VERSION}
          Section: net
          Priority: optional
          Architecture: amd64
          Depends: libgtk-3-0, libwebkit2gtk-4.1-0
          Maintainer: mr-isik <faruk_isik_24@protonmail.com>
          Description: Whaledesk Desktop Client
           Modern desktop client for Whaledesk.
          EOF

          # .desktop file
          cat > "${PKG}/usr/share/applications/whaledesk-desktop.desktop" <<EOF
          [Desktop Entry]
          Name=Whaledesk
          Comment=Whaledesk Desktop Client
          Exec=whaledesk-desktop
          Icon=whaledesk-desktop
          Terminal=false
          Type=Application
          Categories=Network;InstantMessaging;
          EOF

          dpkg-deb --build "$PKG" "${PKG}.deb"

      - name: Package – macOS
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          cd build/bin

          APP=$(find . -maxdepth 1 -name "*.app" | head -n 1)
          if [[ -z "$APP" ]]; then
            echo "ERROR: .app bundle not found!" >&2
            ls -la
            exit 1
          fi

          ditto -c -k --keepParent "$APP" "whaledesk-mac-universal.zip"

      - name: Package – Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $src = Get-ChildItem -Path build\bin -Filter "*-installer.exe" | Select-Object -First 1
          if (-not $src) { Write-Error "Installer EXE not found!"; exit 1 }
          Rename-Item -Path $src.FullName -NewName "whaledesk-windows-amd64-setup.exe"

      - name: Upload artifact – Linux
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            build/bin/whaledesk-linux-amd64.tar.gz
            build/bin/*.deb
          if-no-files-found: error

      - name: Upload artifact – macOS
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: build/bin/whaledesk-mac-universal.zip
          if-no-files-found: error

      - name: Upload artifact – Windows
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: build/bin/whaledesk-windows-amd64-setup.exe
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-files
          merge-multiple: true

      - name: List release files
        run: find release-files -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-files/whaledesk-linux-amd64.tar.gz
            release-files/*.deb
            release-files/whaledesk-mac-universal.zip
            release-files/whaledesk-windows-amd64-setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
