name: Wails Build & Release

on:
  push:
    tags:
      - "v*"

# GitHub'ın Release sayfasına dosya yükleyebilmesi için zorunlu izin
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            wails_flags: "-tags webkit2_41"
          - os: windows-latest
            platform: windows/amd64
            wails_flags: ""
          - os: macos-latest
            platform: darwin/universal
            wails_flags: ""

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Linux Dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Build Application
        run: wails build -platform ${{ matrix.platform }} ${{ matrix.wails_flags }}

      - name: Prepare Files for Release
        shell: bash
        run: |
          cd build/bin
          if [ "${{ runner.os }}" == "Windows" ]; then
            mv *.exe whaledesk-windows.exe
          elif [ "${{ runner.os }}" == "macOS" ]; then
            zip -r whaledesk-mac.zip *.app
          else
            find . -maxdepth 1 -type f -not -name "*.*" -exec mv {} whaledesk-linux \;
            
            # Package as .tar.gz (preserves file execution permissions)
            tar -czf whaledesk-linux.tar.gz whaledesk-linux
            
            # Build Debian package (.deb) for easy installation
            mkdir -p debian/DEBIAN
            mkdir -p debian/usr/bin
            mkdir -p debian/usr/share/applications
            mkdir -p debian/usr/share/pixmaps
            
            cp whaledesk-linux debian/usr/bin/whaledesk-desktop
            chmod +x debian/usr/bin/whaledesk-desktop
            
            if [ -f "../appicon.png" ]; then
              cp ../appicon.png debian/usr/share/pixmaps/whaledesk-desktop.png
            fi
            
            VERSION=$(echo "$GITHUB_REF_NAME" | sed 's/^v//')
            if [ -z "$VERSION" ]; then
              VERSION="1.0.0"
            fi
            
            printf "%s\n" \
              "Package: whaledesk-desktop" \
              "Version: $VERSION" \
              "Section: utils" \
              "Priority: optional" \
              "Architecture: amd64" \
              "Depends: libgtk-3-0, libwebkit2gtk-4.1-0" \
              "Maintainer: mr-isik <faruk_isik_24@protonmail.com>" \
              "Description: Whaledesk Desktop Client" \
              > debian/DEBIAN/control
              
            printf "%s\n" \
              "[Desktop Entry]" \
              "Name=Whaledesk" \
              "Comment=Whaledesk Desktop Client" \
              "Exec=whaledesk-desktop" \
              "Icon=whaledesk-desktop" \
              "Terminal=false" \
              "Type=Application" \
              "Categories=Utility;" \
              > debian/usr/share/applications/whaledesk-desktop.desktop
              
            dpkg-deb --build debian whaledesk-desktop_${VERSION}_amd64.deb
          fi

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/bin/whaledesk-windows.exe
            build/bin/whaledesk-mac.zip
            build/bin/whaledesk-linux.tar.gz
            build/bin/*.deb
